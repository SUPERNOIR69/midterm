<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<style>
    *{
        color: white;
        font-size: 28px;
    }
    .loop{
        display: flex;
        width: 100%;
        height: 100px;
        background-color: rgb(173, 194, 15);
    }
    .home{
        width: 10%;
        height: 100% ;
        
        align-items: center;
        display: flex;
        justify-content: center;
    }
    .history{
        width: 10%;
        height: 100% ;
        
        align-items: center;
        display: flex;
        justify-content: center;
    }
    .vision{
        width: 20%;
        height: 100% ;
        
        align-items: center;
        display: flex;
        justify-content: center;

    }
    a{
        text-decoration: none;
     }
    .vision:hover{
        background-color: grey;
     }
    .home:hover{
        background-color: grey;
     }
    .history:hover{
        background-color: grey;
     }
     
       
</style>
<body>
    <div class="loop">
        <div class="home"><a href=""><i class="fa-solid fa-cube"></i> Home</a></div>
        <div class="history"><a href=""><i class="fa-solid fa-cube"></i> History</a></div>
        <div class="vision"><a href=""><i class="fa-solid fa-cube"></i> Vision and Mission</a></div>
    </div>
  
</body>
</html>
